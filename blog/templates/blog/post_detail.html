{% extends "base.html" %}

{% block title %}{{ post.title }} - Commute By Bike{% endblock %}

{% block content %}
<div class="card mb-3">
    <div class="card-body">
        <h1 class="card-title mb-1">{{ post.title }}</h1>
        <p class="text-body-secondary small mb-4">{{ post.date_posted|date:"F j, Y" }}</p>
        <div class="card-text">{{ post.content|linebreaks }}</div>
    </div>
</div>

<a href="{% url 'blog:index' %}" class="btn btn-outline-secondary">&larr; Back to blog</a>
{% endblock %}
